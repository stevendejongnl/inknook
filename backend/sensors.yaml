# Right-panel configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Public transport departures ───────────────────────────────────────────────
# Each entry is a HA departure sensor (e.g. from the 9292/transitous integration).
# The sensor state is the next departure time; attributes contain 'times' (list of
# planned/estimated dicts), 'line_name', and 'direction'.
#
# max_departures: how many upcoming times to show per direction (default 4)
# short_direction: optional abbreviation shown on the display (saves space)
#
departures:
  - entity_id: sensor.aalsmeer_aalsmeer_midden_340_haarlem_station
    short_direction: "Haarlem Stn"
  - entity_id: sensor.aalsmeer_aalsmeer_midden_340_uithoorn_busstation
    short_direction: "Uithoorn Bus"

# ── Sensor values ─────────────────────────────────────────────────────────────
# List the Home Assistant entities you want displayed below the departures.
# Fields:
#   entity_id  (required) HA entity ID, e.g. sensor.living_room_temperature
#   label      (required) Display name shown on the dashboard
#   unit       (optional) Override the unit; defaults to HA's unit_of_measurement
#
# Binary sensors (on/off) are mapped to readable labels automatically based on
# their device_class: door → Open/Closed, motion → Motion/Clear, etc.
#
# Up to ~6 sensors fit below the departures section.

sensors:
  - entity_id: sensor.temperature_living_room
    label: "Living Room"
  - entity_id: sensor.humidity_living_room
    label: "Humidity"
  - entity_id: sensor.pressure_living_room
    label: "Pressure"
