name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      working-directory: backend
      run: uv sync --all-extras

    - name: Run pytest
      working-directory: backend
      run: uv run pytest --cov=src --cov-fail-under=65 --cov-report=xml

    - name: Run ruff linter
      working-directory: backend
      run: uv run ruff check src tests

    - name: Run mypy type checker
      working-directory: backend
      run: uv run mypy src || true  # TODO: fix type errors after initial deploy

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: backend/coverage.xml
        fail_ci_if_error: false

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install python-semantic-release
      run: pip install python-semantic-release

    - name: Run semantic release
      id: release
      working-directory: backend
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: semantic-release version

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: main

    - name: Get version from pyproject.toml
      id: version
      working-directory: backend
      run: |
        VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: backend
        push: true
        provenance: false  # Avoid OCI index format — Keel can't poll manifests with Accept: OCI index
        tags: |
          ghcr.io/stevendejongnl/inknook-backend:latest
          ghcr.io/stevendejongnl/inknook-backend:${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v6

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.35.0
      with:
        scan-type: fs
        scan-ref: .
        format: sarif
        output: trivy-results.sarif

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.sarif
