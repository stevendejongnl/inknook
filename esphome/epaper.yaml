substitutions:
  name: inknook-dashboard
  friendly_name: "ePaper Dashboard"
  backend_base_url: !secret inknook_backend_base_url
  backend_bmp_url: "${backend_base_url}/display.bmp"
  backend_quote_url: "${backend_base_url}/quote"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 200
    then:
      # Power up the display and give it time to settle before SPI init
      - output.turn_on: display_power
      - delay: 150ms
      # Wait for ADC to stabilize after display power-on draws current, then check battery
      - delay: 1s
      - component.update: battery_voltage
      - lambda: |-
          float v = id(battery_voltage).state;
          // Ignore readings below 1V — ADC hasn't settled yet (spurious sample)
          if (!isnan(v) && v > 1.0f && v < 3.3f) {
            id(battery_low) = true;
          }

esp32:
  board: dfrobot_firebeetle2_esp32e
  framework:
    type: arduino

# ── Connectivity ────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: !secret inknook_device_ip
  # Fallback AP if WiFi unavailable
  ap:
    ssid: "EPaper Fallback"
    password: !secret ota_password
  on_connect:
    then:
      - if:
          condition:
            lambda: 'return id(battery_low);'
          then:
            # Battery too low — show warning screen and sleep 4h instead of fetching
            - globals.set:
                id: loading
                value: 'false'
            - component.update: epaper_display
            - delay: 25s
            - deep_sleep.enter:
                id: main_sleep
                sleep_duration: 4h
          else:
            # Normal path — fetch dashboard image
            - component.update: dashboard_img

safe_mode:
  num_attempts: 3        # After 3 rapid resets, boot into OTA-only mode
  reboot_timeout: 3min   # Stay in safe mode for 3 min waiting for OTA

captive_portal:

logger:
  level: INFO

api:

ota:
  - platform: esphome
    password: !secret ota_password

# ── Time ────────────────────────────────────────────────────────────────────

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Amsterdam
    servers:
      - pool.ntp.org
      - time.nist.gov

# ── I²C (BME280) ────────────────────────────────────────────────────────────

i2c:
  sda: GPIO17
  scl: GPIO16
  scan: true

text_sensor:
  - platform: template
    name: "Daily Quote"
    id: daily_quote
    icon: "mdi:format-quote-open"

interval:
  - interval: 30min
    then:
      - http_request.get:
          url: ${backend_quote_url}
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  // Extract value of "quote" key from JSON {"quote": "..."}
                  auto start = body.find("\"quote\"");
                  if (start != std::string::npos) {
                    start = body.find("\"", start + 7);
                    if (start != std::string::npos) {
                      start += 1;
                      auto end = body.find("\"", start);
                      if (end != std::string::npos) {
                        id(daily_quote).publish_state(body.substr(start, end - start));
                      }
                    }
                  }

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_dbm
    unit_of_measurement: "dBm"
    update_interval: 60s

  - platform: bme280_i2c
    address: 0x76
    update_interval: 60s
    temperature:
      name: "BME280 Temperature"
      id: bme280_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
    humidity:
      name: "BME280 Humidity"
      id: bme280_humidity
      unit_of_measurement: "%"
      accuracy_decimals: 0
    pressure:
      name: "BME280 Pressure"
      id: bme280_pressure
      unit_of_measurement: "hPa"
      accuracy_decimals: 1

  # Battery voltage via ADC (GPIO34 = A2) with 1/2 voltage divider
  # Formula: raw_voltage (0–1V range at pin) × 2 = actual battery voltage
  - platform: adc
    pin: GPIO34
    name: "Battery Voltage"
    id: battery_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 60s
    attenuation: 12dB   # Full range: 0–3.9V
    filters:
      - multiply: 2.0   # Undo the 1/2 divider

# ── Fonts ────────────────────────────────────────────────────────────────────

font:
  # Small font for bottom bar text + small MDI icons (battery, wifi, clock)
  - file: "https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5WZLCzYlKw.ttf"
    id: font_status
    size: 16
    extras:
      - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
        glyphs:
          - "\U000F0079"  # mdi:battery
          - "\U000F007B"  # mdi:battery-20
          - "\U000F007E"  # mdi:battery-50
          - "\U000F0081"  # mdi:battery-80
          - "\U000F0083"  # mdi:battery-alert
          - "\U000F05A9"  # mdi:wifi
          - "\U000F0150"  # mdi:clock-outline

  # Medium font for full-screen state body text
  - file: "https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5WZLCzYlKw.ttf"
    id: font_status_medium
    size: 28

  # Large MDI icons for full-screen states (loading / error / battery low)
  - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_mdi_large
    size: 120
    glyphs:
      - "\U000F05AA"  # mdi:wifi-off        (connection failed)
      - "\U000F0083"  # mdi:battery-alert   (battery low)
      - "\U000F0453"  # mdi:reload          (loading)

# ── SPI (e-paper display) ────────────────────────────────────────────────────

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

# ── Display power control (GPIO26) ──────────────────────────────────────────

output:
  - platform: gpio
    id: display_power
    pin: GPIO26

# ── Global state ─────────────────────────────────────────────────────────────

globals:
  - id: fetch_failed
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: loading
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: battery_low
    type: bool
    restore_value: no
    initial_value: 'false'

# ── HTTP + Image fetch ───────────────────────────────────────────────────────

http_request:
  useragent: "esphome/inknook-dashboard"
  timeout: 30s
  verify_ssl: false

online_image:
  - url: ${backend_bmp_url}
    id: dashboard_img
    format: BMP
    type: BINARY
    update_interval: never   # Triggered manually via component.update
    on_download_finished:
      then:
        - logger.log: "Download finished — clearing loading flag"
        - globals.set:
            id: loading
            value: 'false'
        - logger.log: "Waiting for SNTP sync before render"
        - wait_until:
            condition:
              lambda: 'return id(sntp_time).now().is_valid();'
            timeout: 10s
        - logger.log: "Calling component.update on display"
        - component.update: epaper_display
        - logger.log: "Display update returned — waiting 25s"
        - delay: 25s
        - logger.log: "Entering deep sleep"
        - deep_sleep.enter: main_sleep
    on_error:
      then:
        - logger.log: "Image fetch failed — showing error screen"
        - globals.set:
            id: fetch_failed
            value: 'true'
        - globals.set:
            id: loading
            value: 'false'
        - component.update: epaper_display
        - delay: 20s  # Was 2s — must wait for 7.5" display to finish full refresh
        - deep_sleep.enter: main_sleep

# ── e-Paper display ──────────────────────────────────────────────────────────

display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin: GPIO13
    dc_pin: GPIO22
    reset_pin: GPIO21
    busy_pin:
      number: GPIO14
      inverted: true
    model: 7.50inV2
    reset_duration: 200ms
    update_interval: never   # Display is updated explicitly after image download
    lambda: |-
      if (id(battery_low)) {
        // ── Full-screen: Battery Low ──────────────────────────────────────────
        ESP_LOGI("display", "Rendering: battery low screen");
        it.fill(COLOR_OFF);
        it.printf(400, 140, id(font_mdi_large), TextAlign::CENTER, "\U000F0083");
        it.printf(400, 280, id(font_status_medium), TextAlign::CENTER, "Battery Low");
        it.printf(400, 320, id(font_status_medium), TextAlign::CENTER, "Please charge the device");
        if (!isnan(id(battery_voltage).state)) {
          it.printf(400, 360, id(font_status_medium), TextAlign::CENTER, "%.2fV", id(battery_voltage).state);
        }

      } else if (id(loading)) {
        // ── Full-screen: Loading ──────────────────────────────────────────────
        ESP_LOGI("display", "Rendering: loading screen");
        it.fill(COLOR_OFF);
        it.printf(400, 140, id(font_mdi_large), TextAlign::CENTER, "\U000F0453");
        it.printf(400, 280, id(font_status_medium), TextAlign::CENTER, "Loading dashboard...");

      } else if (id(fetch_failed)) {
        // ── Full-screen: Connection Failed ────────────────────────────────────
        ESP_LOGI("display", "Rendering: connection failed screen");
        it.fill(COLOR_OFF);
        it.printf(400, 140, id(font_mdi_large), TextAlign::CENTER, "\U000F05AA");
        it.printf(400, 280, id(font_status_medium), TextAlign::CENTER, "Connection Failed");
        it.printf(400, 320, id(font_status_medium), TextAlign::CENTER, "Could not reach server");

      } else {
        // ── Normal: dashboard image + bottom status bar ───────────────────────
        ESP_LOGI("display", "Rendering: dashboard image");
        it.image(0, 0, id(dashboard_img));

        // Battery icon based on estimated LiPo percentage
        float batt = id(battery_voltage).state;
        const char* batt_icon = "\U000F0083";  // mdi:battery-alert (fallback)
        char batt_str[8] = "?";
        if (!isnan(batt)) {
          int batt_pct = (int)((batt - 3.0f) / (4.2f - 3.0f) * 100.0f);
          batt_pct = batt_pct < 0 ? 0 : (batt_pct > 100 ? 100 : batt_pct);
          if (batt_pct <= 20)      batt_icon = "\U000F007B";  // mdi:battery-20
          else if (batt_pct <= 50) batt_icon = "\U000F007E";  // mdi:battery-50
          else if (batt_pct <= 80) batt_icon = "\U000F0081";  // mdi:battery-80
          else                     batt_icon = "\U000F0079";  // mdi:battery (full)
          snprintf(batt_str, sizeof(batt_str), "%d%%", batt_pct);
        }
        it.printf(90,  458, id(font_status), batt_icon);
        it.printf(108, 458, id(font_status), batt_str);

        // WiFi icon + signal quality label
        float rssi = id(wifi_signal_dbm).state;
        it.printf(180, 458, id(font_status), "\U000F05A9");  // mdi:wifi
        const char* wifi_str = "---";
        if (!isnan(rssi)) {
          if      (rssi >= -50) wifi_str = "Excellent";
          else if (rssi >= -60) wifi_str = "Good";
          else if (rssi >= -70) wifi_str = "Fair";
          else if (rssi >= -80) wifi_str = "Weak";
          else                  wifi_str = "Poor";
        }
        it.printf(198, 458, id(font_status), wifi_str);

        // Last update time + next update inline — clock icon right after WiFi label
        it.printf(290, 458, id(font_status), "\U000F0150");  // mdi:clock-outline
        auto now = id(sntp_time).now();
        if (now.is_valid()) {
          time_t next_t = now.timestamp + 30 * 60;
          struct tm *next_tm = localtime(&next_t);
          char next_buf[16];
          strftime(next_buf, sizeof(next_buf), "%H:%M", next_tm);
          it.strftime(308, 458, id(font_status), "Updated %H:%M", now);
          it.printf(418, 458, id(font_status), "· Next %s", next_buf);
        } else {
          it.printf(308, 458, id(font_status), "Updated --:-- · Next --:--");
        }
      }

# ── Deep sleep ───────────────────────────────────────────────────────────────

deep_sleep:
  id: main_sleep
  run_duration: 120s     # Max awake time — enough to connect WiFi + fetch + render (was 90s)
  sleep_duration: 30min  # Wake every 30 min between 6 AM and midnight

  # Only sleep during active hours (6:00–23:59); outside that window sleep longer
  # Note: ESPHome evaluates this condition before entering sleep
  wakeup_pin_mode: IGNORE
